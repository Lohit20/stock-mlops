global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: slack-critical
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: slack-warning

    - match:
        severity: info
      receiver: slack-info

receivers:

  - name: default
    slack_configs:
      - channel: "#mlops-alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: >
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

  - name: slack-critical
    slack_configs:
      - channel: "#mlops-critical"
        color: "#FF0000"
        title: ":red_circle: CRITICAL — {{ .GroupLabels.alertname }}"
        text: >
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

  - name: slack-warning
    slack_configs:
      - channel: "#mlops-alerts"
        color: "#FFA500"
        title: ":warning: {{ .GroupLabels.alertname }}"
        text: >
          {{ range .Alerts }}
          {{ .Annotations.summary }}: {{ .Annotations.description }}
          {{ end }}

  - name: slack-info
    slack_configs:
      - channel: "#mlops-info"
        color: "#36A64F"
        title: ":information_source: {{ .GroupLabels.alertname }}"
        text: >
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [alertname]
