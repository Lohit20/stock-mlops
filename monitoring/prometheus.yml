global:
  scrape_interval:     15s
  evaluation_interval: 15s

# ── Alert rules ────────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts/rules.yml

# ── Alertmanager ───────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ── Scrape targets ─────────────────────────────────────────────────────────────
scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: fastapi
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: mlflow
    static_configs:
      - targets: ["mlflow:5000"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
