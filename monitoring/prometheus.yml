# Prometheus Configuration
#
# What is this file?
# Tells Prometheus WHERE to collect metrics from.
# Every 15 seconds, Prometheus visits each target's /metrics endpoint
# and stores the numbers it finds.

global:
  scrape_interval: 15s      # Collect metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate alert rules every 15 seconds

scrape_configs:

  # Collect metrics from Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Collect metrics from FastAPI (model predictions, latency, errors)
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8000']     # 'api' is the Docker service name
    metrics_path: '/metrics'

  # Collect metrics from MLflow server
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']

  # Collect system metrics (CPU, RAM, disk)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
