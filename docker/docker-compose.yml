version: "3.9"

# ── Networks ───────────────────────────────────────────────────────────────────
# backend  — internal service communication (DB, MLflow, Redis, Airflow)
# frontend — externally reachable services (API, MLflow UI, Grafana, Airflow UI)
networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:
  airflow_logs:

# ── Shared environment fragments ───────────────────────────────────────────────
x-mlflow-env: &mlflow-env
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-stock_price_forecasting}

x-db-env: &db-env
  POSTGRES_USER:     ${POSTGRES_USER:-mlops}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlops}
  POSTGRES_DB:       ${POSTGRES_DB:-mlops}

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
    postgresql+psycopg2://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}
    @postgres:5432/${POSTGRES_DB:-mlops}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change-me-in-production}
  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
  PYTHONPATH: /opt/airflow

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mlops_postgres
    restart: unless-stopped
    environment:
      <<: *db-env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1
    container_name: mlops_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: >-
        postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}
        @postgres:5432/${POSTGRES_DB:-mlops}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - backend
      - frontend
    command: >
      bash -c "pip install --quiet psycopg2-binary &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-mlops}:${POSTGRES_PASSWORD:-mlops}@postgres:5432/${POSTGRES_DB:-mlops}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mlops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Prediction Server ─────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.serving
    image: stock-forecast-api:latest
    container_name: mlops_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *mlflow-env
      REDIS_URL: redis://redis:6379/0
      FEATURES_DATA_PATH: /app/data/features
      N_STEPS_IN:  "90"
      N_STEPS_OUT: "30"
    volumes:
      - ../data:/app/data:ro
    networks:
      - backend
      - frontend
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Airflow: one-shot DB init (runs once and exits) ───────────────────────
  airflow-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: stock-forecast-airflow:latest
    container_name: mlops_airflow_init
    environment:
      <<: [*airflow-env, *mlflow-env]
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create
          --username ${AIRFLOW_ADMIN_USER:-admin}
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
          --firstname Admin
          --lastname User
          --role Admin
          --email ${AIRFLOW_ADMIN_EMAIL:-admin@mlops.local}
        || true
      "
    restart: "no"

  # ── Airflow: webserver ────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: stock-forecast-airflow:latest
    container_name: mlops_airflow_webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      <<: [*airflow-env, *mlflow-env]
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    networks:
      - backend
      - frontend
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Airflow: scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: stock-forecast-airflow:latest
    container_name: mlops_airflow_scheduler
    restart: unless-stopped
    environment:
      <<: [*airflow-env, *mlflow-env]
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    networks:
      - backend
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --limit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Training (one-shot — run manually or via Airflow) ────────────────────
  # docker compose run --rm trainer   (defaults to lstm)
  # docker compose run -e MODEL_TYPE=arm --rm trainer
  trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.training
    image: stock-forecast-trainer:latest
    container_name: mlops_trainer
    environment:
      <<: *mlflow-env
      MODEL_TYPE: ${MODEL_TYPE:-lstm}
      FEATURES_DATA_PATH: /app/data/features
      RAW_DATA_PATH: /app/data/raw
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    networks:
      - backend
    depends_on:
      mlflow:
        condition: service_healthy
    profiles:
      - training

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: mlops_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - backend
      - frontend
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Alertmanager ──────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: mlops_alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    volumes:
      - ../monitoring/alertmanager/config.yml:/etc/alertmanager/config.yml:ro
    networks:
      - backend
      - frontend
    command:
      - --config.file=/etc/alertmanager/config.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:9093
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Node Exporter (system metrics: CPU, RAM, disk) ────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: mlops_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - backend
    pid: host

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: mlops_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - backend
      - frontend
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
